 
  name: Deploy AWS Lambda

  on:
    push:
      branches:
        - main
      paths:
        - 'lambda'

  jobs:
    deploy-lambda: # name of our job
      runs-on: ubuntu-layest # Sets or specifies the runner
      steps:
        - uses: actions/checvkout@v2

        - name: Set Up Python # Setsup our python enviroment
          uses: actions/setup-python@v2
          with:
            python-version: '3.14'

        - name: Installs dependencies # Installs any packages
          run: |
            pyhton -m pip install --upgrade pip
            pip install -r lambda/requirements.txt -t lambda/

        - name: Configure AWS Creds # Sets up our AWS credentials
          uses: aws-actions/configure-aws-credentials@v1
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-access-secret-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ca-central-1

        - name: Deploy Lambda Function #Zips lambda directory and updates lambda function
          run: |
            cd lambda
            zip -r lambda.zip .
            aws lambda uopdate-function-cpde --function-name testing-cicd-lambda --zip-file fileb://lambda.zip



    